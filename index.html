<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sulaiman | DevOps Engineer & Cloud Professional</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#0a1628;
  --navy2:#0f2040;
  --navy3:#142850;
  --gold:#c9a84c;
  --gold2:#e8c66a;
  --gold3:#f5dfa0;
  --white:#ffffff;
  --offwhite:#f8f6f0;
  --gray:#8899aa;
  --gray2:#4a5568;
  --light:#e8edf5;
  --border:rgba(201,168,76,0.2);
  --border2:rgba(201,168,76,0.4);
  --shadow:0 4px 32px rgba(10,22,40,0.35);
  --shadow2:0 2px 16px rgba(10,22,40,0.2);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;font-size:16px;}
body{background:var(--navy);color:var(--white);font-family:'IBM Plex Sans',sans-serif;overflow-x:hidden;}

/* ── PAGES ── */
.page{display:none;min-height:100vh;}
.page.active{display:block;}

/* ── TOP HEADER BAR ── */
.top-bar{
  background:rgba(10,22,40,0.97);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(12px);
}
.top-bar-inner{
  max-width:1200px;margin:0 auto;
  padding:0 28px;
  display:flex;align-items:center;justify-content:space-between;
  height:64px;gap:20px;
}
.logo-mark{
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:900;letter-spacing:-0.5px;
  background:linear-gradient(135deg,var(--gold),var(--gold3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;white-space:nowrap;cursor:pointer;
  flex-shrink:0;
}
.contact-strip{
  display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  font-size:12px;color:var(--gray);
}
.contact-strip a{color:var(--gray);text-decoration:none;transition:color .2s;display:flex;align-items:center;gap:5px;}
.contact-strip a:hover{color:var(--gold2);}
.nav-links{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.nav-btn{
  padding:7px 13px;border-radius:6px;border:none;
  background:transparent;color:var(--gray);
  font-family:'IBM Plex Sans',sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;transition:all .2s;letter-spacing:0.3px;white-space:nowrap;
}
.nav-btn:hover,.nav-btn.active{color:var(--gold2);background:rgba(201,168,76,0.1);}
.hamburger{display:none;background:none;border:none;cursor:pointer;flex-direction:column;gap:5px;padding:8px;}
.hamburger span{display:block;width:22px;height:2px;background:var(--gold2);border-radius:2px;transition:all .3s;}
.mobile-nav{display:none;position:fixed;inset:64px 0 0;background:rgba(10,22,40,0.98);z-index:99;flex-direction:column;padding:24px;gap:8px;backdrop-filter:blur(16px);}
.mobile-nav.open{display:flex;}
.mobile-nav .nav-btn{font-size:15px;padding:14px 16px;border-radius:8px;text-align:left;}

/* ── HERO SPLIT ── */
.hero{
  display:grid;grid-template-columns:1fr 1fr;
  min-height:calc(100vh - 64px);
}
.hero-photo{
  background:linear-gradient(160deg,var(--navy3) 0%,var(--navy2) 60%,#0a1e3d 100%);
  position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.hero-photo::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,rgba(201,168,76,0.03) 0px,rgba(201,168,76,0.03) 1px,transparent 1px,transparent 40px),
  repeating-linear-gradient(-45deg,rgba(201,168,76,0.02) 0px,rgba(201,168,76,0.02) 1px,transparent 1px,transparent 40px);
}
.hero-photo-frame{
  position:relative;z-index:1;
  width:280px;height:340px;
  border:2px solid var(--border2);
  border-radius:4px;
  background:linear-gradient(160deg,rgba(201,168,76,0.08),rgba(201,168,76,0.03));
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;
  box-shadow:0 0 60px rgba(201,168,76,0.1);
}
.photo-placeholder{font-size:80px;opacity:0.6;}
.photo-label{font-size:11px;color:var(--gold);letter-spacing:2px;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;}
.hero-corner{
  position:absolute;width:20px;height:20px;border-color:var(--gold2);border-style:solid;
}
.hero-corner.tl{top:-1px;left:-1px;border-width:2px 0 0 2px;}
.hero-corner.tr{top:-1px;right:-1px;border-width:2px 2px 0 0;}
.hero-corner.bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px;}
.hero-corner.br{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}

.hero-content{
  background:var(--offwhite);color:var(--navy);
  display:flex;flex-direction:column;justify-content:center;
  padding:60px 56px;
}
.hero-eyebrow{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;letter-spacing:3px;color:var(--gold);
  text-transform:uppercase;margin-bottom:16px;
  display:flex;align-items:center;gap:10px;
}
.hero-eyebrow::before{content:'';width:32px;height:1px;background:var(--gold);}
.hero-name{
  font-family:'Playfair Display',serif;
  font-size:clamp(36px,4.5vw,58px);
  font-weight:900;line-height:1.05;
  color:var(--navy);margin-bottom:10px;
  letter-spacing:-1px;
}
.hero-title{
  font-size:15px;color:var(--gold);
  font-weight:600;margin-bottom:20px;letter-spacing:0.5px;
}
.hero-bio{
  font-size:14px;line-height:1.8;
  color:var(--gray2);margin-bottom:32px;
  max-width:420px;border-left:3px solid var(--gold);padding-left:16px;
}
.hero-cta{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:36px;}
.btn-primary{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:var(--navy);font-weight:700;font-size:13px;
  padding:13px 24px;border-radius:4px;text-decoration:none;
  letter-spacing:0.5px;transition:all .25s;border:none;cursor:pointer;
  display:inline-flex;align-items:center;gap:8px;font-family:'IBM Plex Sans',sans-serif;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,0.35);}
.btn-outline{
  background:transparent;color:var(--navy);
  border:1.5px solid var(--navy);font-weight:600;font-size:13px;
  padding:12px 22px;border-radius:4px;text-decoration:none;
  letter-spacing:0.5px;transition:all .25s;cursor:pointer;
  display:inline-flex;align-items:center;gap:8px;font-family:'IBM Plex Sans',sans-serif;
}
.btn-outline:hover{background:var(--navy);color:var(--gold2);}
.hero-tags{display:flex;gap:8px;flex-wrap:wrap;}
.htag{
  font-size:10px;padding:4px 12px;border-radius:2px;
  background:rgba(10,22,40,0.08);color:var(--navy);
  font-family:'IBM Plex Mono',monospace;letter-spacing:0.5px;
  border:1px solid rgba(10,22,40,0.15);
}

/* ── SECTION CONTAINERS ── */
.section-wrap{max-width:1200px;margin:0 auto;padding:80px 28px;}
.section-wrap.narrow{max-width:900px;}
.section-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;letter-spacing:4px;color:var(--gold);
  text-transform:uppercase;margin-bottom:12px;
  display:flex;align-items:center;gap:12px;
}
.section-label::after{content:'';flex:1;height:1px;background:var(--border2);}
.section-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(28px,4vw,44px);font-weight:800;
  line-height:1.1;margin-bottom:16px;
}
.section-sub{font-size:14px;color:var(--gray);line-height:1.75;max-width:600px;}

/* ── DIVIDER ── */
.gold-divider{height:1px;background:linear-gradient(90deg,transparent,var(--gold2),transparent);margin:0;}

/* ── EXPERTISE GRID ── */
.expertise-section{background:var(--offwhite);color:var(--navy);}
.expertise-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(10,22,40,0.1);margin-top:56px;}
.expertise-card{
  background:var(--offwhite);padding:40px 32px;
  transition:all .3s;position:relative;overflow:hidden;
}
.expertise-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--gold),var(--gold2));
  transform:scaleX(0);transform-origin:left;transition:transform .3s;
}
.expertise-card:hover::before{transform:scaleX(1);}
.expertise-card:hover{background:#f0ece0;}
.exp-icon{font-size:32px;margin-bottom:20px;}
.exp-title{
  font-family:'Playfair Display',serif;font-size:18px;font-weight:700;
  color:var(--navy);margin-bottom:10px;
}
.exp-desc{font-size:13px;line-height:1.75;color:var(--gray2);}
.exp-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:16px;}
.exp-tag{font-size:10px;padding:3px 10px;background:rgba(201,168,76,0.12);color:var(--gold);border-radius:2px;font-family:'IBM Plex Mono',monospace;}

/* ── CASE STUDIES ── */
.case-section{background:var(--navy2);}
.case-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;margin-top:56px;}
.case-card{
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  border-radius:4px;padding:36px;
  transition:all .3s;cursor:pointer;
  position:relative;overflow:hidden;
}
.case-card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(201,168,76,0.06),transparent);
  opacity:0;transition:opacity .3s;
}
.case-card:hover{border-color:var(--border2);transform:translateY(-4px);box-shadow:var(--shadow);}
.case-card:hover::after{opacity:1;}
.case-num{
  font-family:'IBM Plex Mono',monospace;font-size:11px;
  color:var(--gold);letter-spacing:2px;margin-bottom:16px;
}
.case-title{
  font-family:'Playfair Display',serif;font-size:22px;font-weight:700;
  margin-bottom:12px;color:var(--white);
}
.case-desc{font-size:13px;color:var(--gray);line-height:1.75;margin-bottom:20px;}
.case-result{
  font-size:12px;color:var(--gold2);
  display:flex;align-items:center;gap:8px;
}
.case-result::before{content:'→';}

/* ── TESTIMONIALS ── */
.test-section{background:var(--offwhite);color:var(--navy);}
.test-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:56px;}
.test-card{
  background:var(--white);border-radius:4px;padding:32px;
  border-left:4px solid var(--gold);
  box-shadow:var(--shadow2);transition:transform .3s;
}
.test-card:hover{transform:translateY(-4px);}
.test-quote{
  font-size:13px;line-height:1.85;color:var(--gray2);
  font-style:italic;margin-bottom:24px;
}
.test-quote::before{content:'"';font-size:40px;color:var(--gold);line-height:0;vertical-align:-16px;margin-right:4px;font-family:'Playfair Display',serif;}
.test-author{display:flex;align-items:center;gap:12px;}
.test-avatar{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--navy),var(--navy3));
  display:flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono',monospace;font-size:13px;
  color:var(--gold);font-weight:600;flex-shrink:0;
}
.test-name{font-size:13px;font-weight:600;color:var(--navy);}
.test-role{font-size:11px;color:var(--gray2);}

/* ── CTA SECTION ── */
.cta-section{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy3) 100%);
  text-align:center;padding:100px 28px;
  position:relative;overflow:hidden;
}
.cta-section::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,rgba(201,168,76,0.03) 0px,rgba(201,168,76,0.03) 1px,transparent 1px,transparent 60px),
  repeating-linear-gradient(90deg,rgba(201,168,76,0.02) 0px,rgba(201,168,76,0.02) 1px,transparent 1px,transparent 60px);
}
.cta-inner{position:relative;z-index:1;max-width:600px;margin:0 auto;}
.cta-section .section-title{color:var(--white);}
.cta-section .section-sub{color:var(--gray);margin:0 auto 36px;}

/* ── HUB CARDS (Main page) ── */
.hubs-section{background:var(--navy);}
.hub-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:48px;}
.hub-card{
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);border-radius:6px;
  padding:32px 28px;cursor:pointer;
  transition:all .3s;position:relative;overflow:hidden;
  text-decoration:none;color:inherit;
}
.hub-card:hover{border-color:var(--gold2);background:rgba(201,168,76,0.06);transform:translateY(-4px);box-shadow:var(--shadow);}
.hub-icon{font-size:36px;margin-bottom:16px;}
.hub-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:8px;color:var(--white);}
.hub-desc{font-size:12px;color:var(--gray);line-height:1.7;margin-bottom:16px;}
.hub-arrow{
  font-family:'IBM Plex Mono',monospace;font-size:11px;
  color:var(--gold);display:flex;align-items:center;gap:6px;
}

/* ── DEVOPS SECTION PAGE ── */
.devops-page{background:var(--navy);}
.devops-hero{
  background:linear-gradient(160deg,var(--navy3),var(--navy2));
  padding:60px 28px 48px;border-bottom:1px solid var(--border);
}
.devops-hero-inner{max-width:1200px;margin:0 auto;}
.back-btn{
  font-family:'IBM Plex Mono',monospace;font-size:11px;
  color:var(--gold);background:transparent;border:none;cursor:pointer;
  letter-spacing:1px;padding:0;margin-bottom:24px;
  display:flex;align-items:center;gap:8px;transition:gap .2s;
}
.back-btn:hover{gap:12px;}
.devops-topic-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:16px;
  max-width:1200px;margin:0 auto;padding:40px 28px;
}
.topic-card{
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:6px;padding:28px 24px;cursor:pointer;
  transition:all .3s;
}
.topic-card:hover{border-color:var(--gold2);background:rgba(201,168,76,0.05);transform:translateY(-3px);}
.topic-header{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.topic-icon{font-size:28px;}
.topic-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--white);}
.topic-desc{font-size:12px;color:var(--gray);line-height:1.7;margin-bottom:16px;}
.topic-pills{display:flex;gap:6px;flex-wrap:wrap;}
.topic-pill{
  font-size:10px;padding:3px 10px;border-radius:2px;
  background:rgba(201,168,76,0.1);color:var(--gold2);
  font-family:'IBM Plex Mono',monospace;border:1px solid rgba(201,168,76,0.2);
}

/* ── TOPIC DETAIL PAGE ── */
.topic-detail{background:var(--navy);}
.topic-detail-hero{
  background:linear-gradient(135deg,var(--navy3),var(--navy));
  padding:56px 28px 40px;border-bottom:1px solid var(--border);
}
.topic-detail-inner{max-width:1200px;margin:0 auto;}
.content-tabs{
  display:flex;gap:2px;background:rgba(255,255,255,0.05);
  border-radius:6px;padding:4px;margin-top:24px;width:fit-content;
  border:1px solid var(--border);
}
.ctab-btn{
  padding:9px 20px;border-radius:4px;border:none;
  background:transparent;color:var(--gray);
  font-family:'IBM Plex Sans',sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;transition:all .2s;
}
.ctab-btn.active{background:var(--gold);color:var(--navy);font-weight:700;}
.content-area{max-width:1200px;margin:0 auto;padding:40px 28px;}
.ctab-pane{display:none;}
.ctab-pane.active{display:block;}

/* DOCS LIST */
.doc-list{display:flex;flex-direction:column;gap:12px;}
.doc-item{
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:4px;padding:20px 24px;
  display:flex;align-items:center;gap:16px;
  transition:all .25s;cursor:pointer;
}
.doc-item:hover{border-color:var(--border2);background:rgba(201,168,76,0.04);}
.doc-item-icon{font-size:24px;flex-shrink:0;}
.doc-item-info{flex:1;}
.doc-item-title{font-size:14px;font-weight:600;color:var(--white);margin-bottom:4px;}
.doc-item-meta{font-size:11px;color:var(--gray);font-family:'IBM Plex Mono',monospace;}
.doc-badge{
  font-size:10px;padding:4px 12px;border-radius:2px;
  font-family:'IBM Plex Mono',monospace;
  background:rgba(201,168,76,0.1);color:var(--gold2);
  border:1px solid rgba(201,168,76,0.2);white-space:nowrap;
}

/* DEMO CARDS */
.demo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;}
.demo-card{
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:6px;padding:28px;transition:all .3s;
}
.demo-card:hover{border-color:var(--gold2);transform:translateY(-3px);}
.demo-title{
  font-family:'Playfair Display',serif;font-size:18px;font-weight:700;
  margin-bottom:8px;color:var(--white);
}
.demo-desc{font-size:12px;color:var(--gray);line-height:1.7;margin-bottom:20px;}
.demo-steps{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.demo-step{
  display:flex;align-items:flex-start;gap:12px;
  font-size:12px;color:var(--light);line-height:1.6;
}
.step-num{
  width:22px;height:22px;border-radius:50%;
  background:var(--gold);color:var(--navy);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;
}
.demo-code{
  background:#0d1f38;border:1px solid rgba(201,168,76,0.15);
  border-radius:4px;padding:16px;
  font-family:'IBM Plex Mono',monospace;font-size:11px;
  color:#a8d8ea;line-height:1.7;overflow-x:auto;
  margin-top:12px;
}
.demo-code .cmd{color:var(--gold2);}
.demo-code .cmt{color:#4a6580;}
.demo-code .str{color:#a8d8ea;}

/* ARCH DIAGRAM */
.arch-container{
  background:rgba(255,255,255,0.03);border:1px solid var(--border);
  border-radius:6px;padding:32px;
}
.arch-svg{width:100%;max-width:700px;margin:0 auto;display:block;}

/* ── PYTHON PAGE ── */
.python-page{background:var(--navy);}
.py-modules-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-top:32px;}
.py-module{
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:6px;padding:28px;transition:all .3s;
}
.py-module:hover{border-color:var(--border2);}
.py-module-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.py-level{
  font-size:10px;padding:3px 10px;border-radius:2px;
  font-family:'IBM Plex Mono',monospace;
}
.py-level.beginner{background:rgba(52,211,153,0.1);color:#34d399;border:1px solid rgba(52,211,153,0.2);}
.py-level.intermediate{background:rgba(251,191,36,0.1);color:#fbbf24;border:1px solid rgba(251,191,36,0.2);}
.py-level.advanced{background:rgba(251,113,133,0.1);color:#fb7185;border:1px solid rgba(251,113,133,0.2);}
.py-module-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--white);}
.py-topics{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.py-topic{
  display:flex;align-items:center;gap:10px;
  font-size:12px;color:var(--light);padding:8px 12px;
  background:rgba(255,255,255,0.03);border-radius:3px;
  border-left:2px solid rgba(201,168,76,0.3);
}
.py-status{
  width:8px;height:8px;border-radius:50%;
  background:rgba(201,168,76,0.4);flex-shrink:0;
}

/* ── DOCUMENTS & CERTIFICATES ── */
.docs-page{background:var(--navy);}
.cert-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:32px;}
.cert-card{
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  border-radius:6px;padding:24px;text-align:center;
  transition:all .3s;cursor:pointer;
}
.cert-card:hover{border-color:var(--gold2);transform:translateY(-3px);}
.cert-icon{font-size:40px;margin-bottom:12px;}
.cert-title{font-size:14px;font-weight:600;color:var(--white);margin-bottom:4px;}
.cert-org{font-size:11px;color:var(--gold2);margin-bottom:8px;font-family:'IBM Plex Mono',monospace;}
.cert-date{font-size:10px;color:var(--gray);}
.cert-placeholder{
  font-size:11px;color:rgba(201,168,76,0.5);
  border:2px dashed rgba(201,168,76,0.25);
